# Example configuration file for hmauto
# Copy this to conf/conf.yaml and update with your values

# Redis key prefix — all keys are namespaced as {prefix}:{key}
# Useful when sharing a Redis instance across services (e.g. set to the service name)
redisKeyPrefix: "hmauto"

http:
  host: "0.0.0.0"
  port: "8080"

mcp:
  host: "0.0.0.0"
  port: "8081"

log:
  level: "info"  # debug, info, warn, error
  type: "json"   # console, json
  logFileEnabled: false
  logFilePath: "logs/app.log"

redis:
  host: "localhost"
  port: "6379"
  password: ""
  db: 0

mqtt:
  user: "your_mqtt_user"
  password: "your_mqtt_password"
  host: "localhost"
  port: "5672"

# Security configuration
security:
  # Generate: openssl rand -hex 32
  bearerToken: "your-long-random-token-here-change-this-in-production"
  mcpToken: "your-separate-mcp-token-here-change-this-in-production"

  # Maximum request body size in bytes (1MB = 1048576)
  maxRequestSize: 1048576

  # Rate limiting: requests per minute
  rateLimitPerMin: 60

  # Rate limiting: maximum burst size
  rateLimitBurst: 10

# OpenTelemetry configuration
otel:
  endpoint: "localhost:4317"  # OTLP gRPC endpoint
  serviceName: "hmauto"
  enabled: true

# Sentry error tracking
sentry:
  dsn: ""  # e.g. "https://xxx@sentry.io/yyy"
  environment: "production"
  sampleRate: 0.1
