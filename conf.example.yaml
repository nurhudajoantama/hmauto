# Example configuration file for hmauto
# Copy this to conf/conf.yaml and update with your values

http:
  host: "0.0.0.0"
  port: "8080"

log:
  level: "info"  # debug, info, warn, error
  type: "console"  # console, json
  logFileEnabled: false
  logFilePath: "logs/app.log"

db:
  user: "your_db_user"
  password: "your_db_password"
  host: "localhost"
  port: "5432"
  name: "your_db_name"
  maxIdleConn: 10
  maxOpenConn: 100
  sslMode: "require"  # disable, require, verify-ca, verify-full (use 'require' or higher for production)

mqtt:
  user: "your_mqtt_user"
  password: "your_mqtt_password"
  host: "localhost"
  port: "5672"

internetCheck:
  checkAddress: "https://www.google.com"
  modemAddress: "http://192.168.1.1"
  interval: "30s"
  switchKey: "modem_switch"

# Security configuration
security:
  # Enable API key authentication (recommended for production)
  enableAuth: true
  
  # List of valid API keys
  # Generate strong random keys: openssl rand -hex 32
  apiKeys:
    - "your-api-key-here-change-this-in-production"
    - "another-api-key-for-different-client"
  
  # Maximum request body size in bytes (1MB = 1048576)
  maxRequestSize: 1048576
  
  # Rate limiting: requests per minute
  rateLimitPerMin: 60
  
  # Rate limiting: maximum burst size
  rateLimitBurst: 10

# Discord webhook URLs for alerts
discordWebhookError:
  url: "https://discord.com/api/webhooks/your/error/webhook"

discordWebhookWarning:
  url: "https://discord.com/api/webhooks/your/warning/webhook"

discordWebhookInfo:
  url: "https://discord.com/api/webhooks/your/info/webhook"
