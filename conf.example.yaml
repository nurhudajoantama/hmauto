# Example configuration file for hmauto
# Copy this to conf/conf.yaml and update with your values

http:
  host: "0.0.0.0"
  port: "8080"

log:
  level: "info"  # debug, info, warn, error
  type: "json"   # console, json
  logFileEnabled: false
  logFilePath: "logs/app.log"

redis:
  host: "localhost"
  port: "6379"
  password: ""
  db: 0

mqtt:
  user: "your_mqtt_user"
  password: "your_mqtt_password"
  host: "localhost"
  port: "5672"

internetCheck:
  checkAddress: "https://www.google.com"
  modemAddress: "http://192.168.1.1"
  interval: "30s"
  switchKey: "modem_switch"

# Security configuration
security:
  # Master admin key for /admin/* endpoints (config only, never stored in Redis)
  # Generate: openssl rand -hex 32
  adminKey: "your-admin-key-here-change-this-in-production"

  # Enable API key authentication (recommended for production)
  enableAuth: true

  # Maximum request body size in bytes (1MB = 1048576)
  maxRequestSize: 1048576

  # Rate limiting: requests per minute
  rateLimitPerMin: 60

  # Rate limiting: maximum burst size
  rateLimitBurst: 10

# OpenTelemetry configuration
otel:
  endpoint: "localhost:4317"  # OTLP gRPC endpoint
  serviceName: "hmauto"
  enabled: true

# Sentry error tracking
sentry:
  dsn: ""  # e.g. "https://xxx@sentry.io/yyy"
  environment: "production"
  sampleRate: 0.1

# Discord webhook URLs for alerts
discordWebhookError:
  url: "https://discord.com/api/webhooks/your/error/webhook"

discordWebhookWarning:
  url: "https://discord.com/api/webhooks/your/warning/webhook"

discordWebhookInfo:
  url: "https://discord.com/api/webhooks/your/info/webhook"
