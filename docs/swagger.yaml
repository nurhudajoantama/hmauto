basePath: /v1
definitions:
  apikey.KeyMetadata:
    properties:
      created_at:
        type: string
      key_hint:
        type: string
      label:
        type: string
      last_used:
        type: string
    type: object
  hmalert.PublishAlertRequest:
    properties:
      level:
        example: info
        type: string
      message:
        example: Internet is down
        type: string
      type:
        example: internet
        type: string
    type: object
  hmapikey.CreateKeyRequest:
    properties:
      label:
        example: iot-device-1
        type: string
    type: object
  hmapikey.CreateKeyResponse:
    properties:
      created_at:
        type: string
      key:
        example: a1b2c3d4e5f6...
        type: string
      label:
        example: iot-device-1
        type: string
    type: object
  hmstt.SetStateRequest:
    properties:
      value:
        example: "on"
        type: string
    type: object
  hmstt.StateResponse:
    properties:
      key:
        example: modem
        type: string
      type:
        example: switch
        type: string
      updated_at:
        example: "2026-03-16T12:34:56Z"
        type: string
      value:
        example: "on"
        type: string
    type: object
  response.JsonResponse:
    properties:
      data: {}
      error: {}
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Home automation backend API for IoT state management, alerting, and
    internet monitoring.
  title: hmauto API
  version: "1.0"
paths:
  /admin/apikeys:
    get:
      description: Returns metadata for all active API keys. The full key value is
        never returned.
      produces:
      - application/json
      responses:
        "200":
          description: List of API key metadata
          schema:
            allOf:
            - $ref: '#/definitions/response.JsonResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/apikey.KeyMetadata'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/response.JsonResponse'
      security:
      - AdminKeyAuth: []
      summary: List API keys
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Creates a new API key. The full key is returned only in this response
        — store it securely.
      parameters:
      - description: Key label
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hmapikey.CreateKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created key (shown once)
          schema:
            allOf:
            - $ref: '#/definitions/response.JsonResponse'
            - properties:
                data:
                  $ref: '#/definitions/hmapikey.CreateKeyResponse'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/response.JsonResponse'
      security:
      - AdminKeyAuth: []
      summary: Create an API key
      tags:
      - admin
  /admin/apikeys/{key}:
    delete:
      description: Permanently revokes an API key by its full key value
      parameters:
      - description: Full API key to revoke
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Key revoked
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "404":
          description: Key not found
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/response.JsonResponse'
      security:
      - AdminKeyAuth: []
      summary: Revoke an API key
      tags:
      - admin
  /alerts:
    post:
      consumes:
      - application/json
      description: Publishes a single alert to the alert pipeline (RabbitMQ → Discord)
      parameters:
      - description: Alert payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hmalert.PublishAlertRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Alert published
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/response.JsonResponse'
      security:
      - ApiKeyAuth: []
      summary: Publish an alert
      tags:
      - alerts
  /alerts/batch:
    post:
      consumes:
      - application/json
      description: Publishes up to 100 alerts concurrently to the alert pipeline
      parameters:
      - description: Array of alert payloads (max 100)
        in: body
        name: body
        required: true
        schema:
          items:
            $ref: '#/definitions/hmalert.PublishAlertRequest'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: All alerts published
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "400":
          description: Validation error or batch too large
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "500":
          description: One or more alerts failed
          schema:
            $ref: '#/definitions/response.JsonResponse'
      security:
      - ApiKeyAuth: []
      summary: Publish alerts in batch
      tags:
      - alerts
  /states:
    get:
      description: Returns all states across every type
      produces:
      - application/json
      responses:
        "200":
          description: List of states
          schema:
            allOf:
            - $ref: '#/definitions/response.JsonResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/hmstt.StateResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/response.JsonResponse'
      security:
      - ApiKeyAuth: []
      summary: List all states
      tags:
      - states
  /states/{type}:
    get:
      description: Returns all states for a given type (e.g. switch)
      parameters:
      - description: State type
        example: switch
        in: path
        name: type
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of states
          schema:
            allOf:
            - $ref: '#/definitions/response.JsonResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/hmstt.StateResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "404":
          description: No states found for type
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/response.JsonResponse'
      security:
      - ApiKeyAuth: []
      summary: List states by type
      tags:
      - states
  /states/{type}/{key}:
    get:
      description: Returns the state for a specific type and key
      parameters:
      - description: State type
        example: switch
        in: path
        name: type
        required: true
        type: string
      - description: State key
        example: modem
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: State entry
          schema:
            allOf:
            - $ref: '#/definitions/response.JsonResponse'
            - properties:
                data:
                  $ref: '#/definitions/hmstt.StateResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "404":
          description: State not found
          schema:
            $ref: '#/definitions/response.JsonResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a single state
      tags:
      - states
    put:
      consumes:
      - application/json
      description: 'Creates or updates the state for a specific type and key. Valid
        types: switch (values: on, off)'
      parameters:
      - description: State type
        example: switch
        in: path
        name: type
        required: true
        type: string
      - description: State key
        example: modem
        in: path
        name: key
        required: true
        type: string
      - description: State value
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/hmstt.SetStateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated state
          schema:
            allOf:
            - $ref: '#/definitions/response.JsonResponse'
            - properties:
                data:
                  $ref: '#/definitions/hmstt.StateResponse'
              type: object
        "400":
          description: Invalid type/key/value
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.JsonResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/response.JsonResponse'
      security:
      - ApiKeyAuth: []
      summary: Set a state value
      tags:
      - states
schemes:
- http
- https
securityDefinitions:
  AdminKeyAuth:
    description: 'Format: Bearer {admin-key}'
    in: header
    name: Authorization
    type: apiKey
  ApiKeyAuth:
    description: 'Format: Bearer {api-key}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
